<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webcam + Digital Twin</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      overflow: hidden;
    }
    .container {
      display: flex;
      width: 100vw;
      height: 100vh;
      gap: 0;
    }
    .panel {
      flex: 1;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .panel-label {
      position: absolute;
      top: 12px;
      left: 12px;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.9;
      z-index: 2;
    }
    .webcam-panel .panel-label { color: #6ee7b7; }
    .twin-panel .panel-label { color: #93c5fd; }
    .webcam-panel {
      background: #111;
      border-right: 1px solid #222;
    }
    .webcam-panel img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .twin-panel {
      background: #000;
    }
    #twin-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="panel webcam-panel">
      <span class="panel-label">Webcam</span>
      <img src="/video_feed" alt="Webcam stream" id="webcam-img" />
    </div>
    <div class="panel twin-panel">
      <span class="panel-label">Digital Twin — 3D Hand · Drag to rotate, scroll to zoom</span>
      <canvas id="twin-canvas"></canvas>
    </div>
  </div>

  <script>
    (function() {
      const canvas = document.getElementById('twin-canvas');
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0a0f);

      const camera = new THREE.PerspectiveCamera(50, 1, 0.01, 100);
      camera.position.set(0, 0.5, 3.5);
      camera.lookAt(0, 0.3, 0);

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;

      const ambient = new THREE.AmbientLight(0x7efff5, 0.3);
      scene.add(ambient);
      const key = new THREE.DirectionalLight(0xffffff, 0.9);
      key.position.set(3, 5, 3);
      key.castShadow = true;
      scene.add(key);
      const rim = new THREE.DirectionalLight(0x00ffcc, 0.4);
      rim.position.set(-3, 1, -2);
      scene.add(rim);
      const fill = new THREE.PointLight(0x7efff5, 0.5, 8);
      fill.position.set(0, 3, 1);
      scene.add(fill);

      // Slightly warmer, more natural skin tone and softer joints
      const skinMat = new THREE.MeshStandardMaterial({
        color: 0xf3c6a4,    // warm light skin tone
        roughness: 0.62,    // a bit more matte, less plastic
        metalness: 0.02,
        envMapIntensity: 0.35
      });
      const jointMat = new THREE.MeshStandardMaterial({
        color: 0xe0a27a,    // slightly darker, joint-like tone
        roughness: 0.55,
        metalness: 0.03
      });

      function makeCylinder(rTop, rBot, h, segs) { return new THREE.CylinderGeometry(rTop, rBot, h, segs || 8); }
      function makeSphere(r, ws, hs) { return new THREE.SphereGeometry(r, ws || 8, hs || 8); }

      function addSegment(parent, length, radius) {
        const mat = skinMat.clone();
        const mesh = new THREE.Mesh(makeCylinder(radius * 0.9, radius, length, 8), mat);
        mesh.castShadow = true;
        mesh.position.y = length / 2;
        const pivot = new THREE.Object3D();
        pivot.add(mesh);
        parent.add(pivot);
        const knuckle = new THREE.Mesh(makeSphere(radius * 0.95, 8, 8), jointMat.clone());
        knuckle.castShadow = true;
        pivot.add(knuckle);
        return { pivot, mesh, length };
      }

      const handRoot = new THREE.Object3D();
      handRoot.rotation.x = -0.3;
      scene.add(handRoot);

      // Pivot that represents the actual wrist joint – this will rotate from landmarks
      const wristPivot = new THREE.Object3D();
      handRoot.add(wristPivot);

      // Palm as a rounded rectangle extruded into 3D, mounted on a pivot so it can flex
      const palmPivot = new THREE.Object3D();
      wristPivot.add(palmPivot);

      const palmWidth = 0.72;
      const palmHeight = 0.9;
      const palmDepth = 0.2;
      const palmRadius = 0.18;

      const palmShape = new THREE.Shape();
      const hw = palmWidth / 2;
      const hh = palmHeight / 2;

      palmShape.moveTo(-hw + palmRadius, -hh);
      palmShape.lineTo(hw - palmRadius, -hh);
      palmShape.quadraticCurveTo(hw, -hh, hw, -hh + palmRadius);
      palmShape.lineTo(hw, hh - palmRadius);
      palmShape.quadraticCurveTo(hw, hh, hw - palmRadius, hh);
      palmShape.lineTo(-hw + palmRadius, hh);
      palmShape.quadraticCurveTo(-hw, hh, -hw, hh - palmRadius);
      palmShape.lineTo(-hw, -hh + palmRadius);
      palmShape.quadraticCurveTo(-hw, -hh, -hw + palmRadius, -hh);

      const palmGeo = new THREE.ExtrudeGeometry(palmShape, {
        depth: palmDepth,
        bevelEnabled: true,
        bevelThickness: 0.03,
        bevelSize: 0.03,
        bevelSegments: 4,
        steps: 1,
      });
      palmGeo.center();

      const palm = new THREE.Mesh(palmGeo, skinMat);
      palm.castShadow = true;
      palm.receiveShadow = true;
      palmPivot.add(palm);

      // Landmark-style helper dots on the palm (3 top, 2 bottom)
      const dotMat = new THREE.MeshStandardMaterial({ color: 0xff4b4b, roughness: 0.35, metalness: 0.1 });
      const dotGeo = new THREE.SphereGeometry(0.025, 10, 10);
      const topDots = [
        new THREE.Vector3(-0.2,  0.32, palmDepth * 0.6),
        new THREE.Vector3( 0.0,  0.36, palmDepth * 0.6),
        new THREE.Vector3( 0.2,  0.32, palmDepth * 0.6),
      ];
      const bottomDots = [
        new THREE.Vector3(-0.12, -0.28, palmDepth * 0.6),
        new THREE.Vector3( 0.12, -0.28, palmDepth * 0.6),
      ];
      [...topDots, ...bottomDots].forEach(pos => {
        const m = new THREE.Mesh(dotGeo, dotMat);
        m.position.copy(pos);
        m.castShadow = true;
        palmPivot.add(m);
      });

      const fingers = [];
      function buildFinger(xOffset, yBase, segLengths, segRadii, fingerIndex) {
        const root = new THREE.Object3D();
        root.position.set(xOffset, yBase, 0);
        wristPivot.add(root);
        const segs = [];
        let parent = root;
        for (let i = 0; i < segLengths.length; i++) {
          const s = addSegment(parent, segLengths[i], segRadii[i]);
          segs.push(s);
          if (i < segLengths.length - 1) {
            const nextBase = new THREE.Object3D();
            nextBase.position.y = segLengths[i];
            s.pivot.add(nextBase);
            parent = nextBase;
          }
        }
        fingers[fingerIndex] = { segs, root };
      }

      const fingerDefs = [
        { x: -0.265, segs: [0.28, 0.22, 0.16], radii: [0.065, 0.06, 0.052] },
        { x: -0.088, segs: [0.30, 0.24, 0.17], radii: [0.068, 0.063, 0.055] },
        { x: 0.088, segs: [0.28, 0.22, 0.16], radii: [0.065, 0.060, 0.052] },
        { x: 0.265, segs: [0.22, 0.17, 0.13], radii: [0.058, 0.052, 0.046] }
      ];
      fingerDefs.forEach((def, i) => buildFinger(def.x, 0.45, def.segs, def.radii, i + 1));

      const thumbRoot = new THREE.Object3D();
      thumbRoot.position.set(-0.42, 0.05, 0.06);
      thumbRoot.rotation.z = 0.5;
      thumbRoot.rotation.y = -0.3;
      wristPivot.add(thumbRoot);
      const thumbSegs = [];
      let thumbParent = thumbRoot;
      const tLengths = [0.22, 0.19, 0.15];
      const tRadii = [0.075, 0.068, 0.058];
      for (let i = 0; i < 3; i++) {
        const s = addSegment(thumbParent, tLengths[i], tRadii[i]);
        thumbSegs.push(s);
        if (i < 2) {
          const nb = new THREE.Object3D();
          nb.position.y = tLengths[i];
          s.pivot.add(nb);
          thumbParent = nb;
        }
      }
      fingers[0] = { segs: thumbSegs, root: thumbRoot };

      const wristGeo = new THREE.CylinderGeometry(0.28, 0.3, 0.22, 10);
      const wrist = new THREE.Mesh(wristGeo, skinMat);
      wrist.castShadow = true;
      wrist.position.y = -0.55;
      wristPivot.add(wrist);

      const curlState = [0, 0, 0, 0, 0];
      const curlAngles = [
        [0.7, 0.7, 0.5],
        [1.5, 1.4, 1.2],
        [1.5, 1.4, 1.2],
        [1.5, 1.4, 1.2],
        [1.5, 1.4, 1.2],
      ];
      function applyFingerCurl() {
        fingers.forEach((finger, fi) => {
          const curl = curlState[fi];
          finger.segs.forEach((seg, si) => { seg.pivot.rotation.x = curl * curlAngles[fi][si]; });
        });
      }

      // Smoothed palm bend value (0 = flat, 1 = fully curled)
      let palmBend = 0;
      let palmBendTarget = 0;

      // Smoothed hand translation so the whole 3D hand follows your real wrist
      let handOffsetX = 0;
      let handOffsetY = 0;
      let handOffsetZ = 0;

      // Smoothed hand orientation so the 3D hand rotates like your real palm
      const handQuat = new THREE.Quaternion();
      const handQuatTarget = new THREE.Quaternion();
      let hasHandOrientation = false;

      window.updateFromLandmarks = function(landmarks) {
        const fingerTips = [4, 8, 12, 16, 20];
        const fingerMCPs = [2, 5, 9, 13, 17];
        const wristPt = landmarks[0];
        fingerTips.forEach((tipIdx, fi) => {
          const mcp = landmarks[fingerMCPs[fi]];
          const tip = landmarks[tipIdx];
          const tipDist = Math.sqrt(
            Math.pow(tip.x - wristPt.x, 2) + Math.pow(tip.y - wristPt.y, 2) + Math.pow((tip.z || 0) - (wristPt.z || 0), 2)
          );
          const mcpDist = Math.sqrt(
            Math.pow(mcp.x - wristPt.x, 2) + Math.pow(mcp.y - wristPt.y, 2) + Math.pow((mcp.z || 0) - (wristPt.z || 0), 2)
          );
          const ratio = Math.min(tipDist / (mcpDist * 1.8), 1.0);
          curlState[fi] = 1.0 - ratio;
        });
        applyFingerCurl();

        // Drive palm bend from average curl of the four fingers (ignore thumb)
        const avgCurl =
          (curlState[1] + curlState[2] + curlState[3] + curlState[4]) / 4;
        palmBendTarget = Math.min(Math.max(avgCurl, 0), 1);

        // Compute target hand translation from wrist position (0–1 normalized image space)
        // Centered so 0.5 is the middle of the webcam image.
        const wx = wristPt.x - 0.5;
        const wy = 0.5 - wristPt.y; // invert Y so up in image = up in 3D
        const wz = (wristPt.z || 0);

        const targetX = wx * 1.2;     // horizontal shift left/right
        const targetY = wy * 1.2;     // vertical shift up/down
        const targetZ = -wz * 0.8;    // subtle depth change

        const followAlpha = 0.18;     // smoothing factor
        handOffsetX += (targetX - handOffsetX) * followAlpha;
        handOffsetY += (targetY - handOffsetY) * followAlpha;
        handOffsetZ += (targetZ - handOffsetZ) * followAlpha;

        // --- Hand orientation from red‑dot style palm points (wrist, index MCP, pinky MCP) ---
        const midMcp = landmarks[9];
        const indexMcp = landmarks[5];
        const pinkyMcp = landmarks[17];

        const vWrist = new THREE.Vector3(wristPt.x, wristPt.y, wristPt.z || 0);
        const vIndex = new THREE.Vector3(indexMcp.x, indexMcp.y, indexMcp.z || 0);
        const vPinky = new THREE.Vector3(pinkyMcp.x, pinkyMcp.y, pinkyMcp.z || 0);
        const vMiddle = new THREE.Vector3(midMcp.x, midMcp.y, midMcp.z || 0);

        // Local axes for the palm: X across knuckles, Y from wrist to middle finger, Z = palm normal
        const xAxis = new THREE.Vector3().subVectors(vIndex, vPinky).normalize();
        const yAxis = new THREE.Vector3().subVectors(vMiddle, vWrist).normalize();
        const zAxis = new THREE.Vector3().crossVectors(xAxis, yAxis).normalize();
        yAxis.crossVectors(zAxis, xAxis).normalize();

        // Flip axes to match the 3D hand's coordinate system (fix opposite motion)
        xAxis.multiplyScalar(-1);
        yAxis.multiplyScalar(-1);

        const m = new THREE.Matrix4();
        m.makeBasis(xAxis, yAxis, zAxis);
        handQuatTarget.setFromRotationMatrix(m);
        hasHandOrientation = true;
      };

      let isDragging = false, prevMouse = { x: 0, y: 0 };
      canvas.addEventListener('mousedown', e => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; });
      canvas.addEventListener('mouseup', () => isDragging = false);
      canvas.addEventListener('mousemove', e => {
        if (!isDragging) return;
        // Rotation is now driven by landmarks; dragging is kept only for future tweaks.
        prevMouse = { x: e.clientX, y: e.clientY };
      });
      canvas.addEventListener('wheel', e => {
        camera.position.z = Math.max(1.5, Math.min(6, camera.position.z + e.deltaY * 0.005));
      });
      canvas.addEventListener('touchstart', e => {
        isDragging = true;
        prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      });
      canvas.addEventListener('touchend', () => isDragging = false);
      canvas.addEventListener('touchmove', e => {
        if (!isDragging) return;
        prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      });

      setInterval(function() {
        fetch('/api/hand_landmarks').then(function(r) { return r.json(); }).then(function(data) {
          if (data.landmarks && data.landmarks.length) window.updateFromLandmarks(data.landmarks);
        }).catch(function() {});
      }, 30);

      const clock = new THREE.Clock();
      function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();

        // Smooth hand orientation from landmarks
        if (hasHandOrientation) {
          handQuat.slerp(handQuatTarget, 0.18);
          handRoot.quaternion.copy(handQuat);
        }

        // Base idle bob + live tracking offset from the real wrist
        handRoot.position.x = handOffsetX;
        handRoot.position.y = handOffsetY + Math.sin(t * 0.8) * 0.03;
        handRoot.position.z = handOffsetZ;

        // Smooth palm bending so it feels organic
        palmBend += (palmBendTarget - palmBend) * 0.15;
        // Slight flex forward/back and a tiny side tilt when making a fist
        palmPivot.rotation.x = -palmBend * 0.3;
        palmPivot.rotation.z = palmBend * 0.12;

        const w = canvas.clientWidth, h = canvas.clientHeight;
        if (canvas.width !== w || canvas.height !== h) {
          renderer.setSize(w, h);
          camera.aspect = w / h;
          camera.updateProjectionMatrix();
        }
        renderer.render(scene, camera);
      }
      animate();
    })();
  </script>
</body>
</html>
